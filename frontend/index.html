<html lang="en">
<head>

<title>CloudScreen — Resume Intelligence</title>

<style>
:root{--bg:#07080f;--bg2:#0d0f1a;--bg3:#111422;--border:rgba(99,120,255,0.12);--border2:rgba(99,120,255,0.22);--accent:#6366f1;--accent2:#818cf8;--green:#34d399;--amber:#fbbf24;--red:#f87171;--text:#e8eaf5;--text2:#8b93b8;--text3:#485077}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto}
.main{margin-left:240px;flex:1}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-name{font-family:'DM Serif Display',serif;font-size:20px}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.nav{padding:12px;flex:1}
.nav-sec{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);padding:0 8px;margin:14px 0 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent2);border-color:rgba(99,102,241,.2)}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:8px}
.user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.page-title{font-family:'DM Serif Display',serif;font-size:21px}
.page-sub{font-size:11px;color:var(--text3);margin-top:2px}
.content{padding:24px 28px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.kpi-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.kpi-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.form-group{margin-bottom:14px}
.lbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
input,textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13.5px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:130px;line-height:1.6}
.ierr{border-color:var(--red)!important}
.ferr{font-size:11px;color:var(--red);margin-top:4px}
.ccnt{font-size:10px;color:var(--text3);text-align:right;margin-top:3px}
button{font-family:'Outfit',sans-serif;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;border:none;transition:all .15s;text-decoration:none;white-space:nowrap;cursor:pointer}
.btnp{background:var(--accent);color:#fff}
.btnp:hover:not(:disabled){background:#4f51cc;transform:translateY(-1px)}
.btng{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btng:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.btnd{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btnd:hover:not(:disabled){background:rgba(248,113,113,.2)}
.btnsm{padding:6px 12px;font-size:12px}
button:disabled{opacity:.5;cursor:not-allowed}
.upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.upload-zone:hover,.drag{border-color:var(--accent);background:rgba(99,102,241,.06)}
.rank-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:18px;cursor:pointer;transition:all .2s}
.rank-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.sbar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.sbar{height:6px;border-radius:4px;transition:width .7s}
.vb{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.vbs{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.vbg{background:rgba(99,102,241,.12);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.vbp{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.vbw{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.tag{display:inline-flex;align-items:center;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.18);color:var(--accent2);border-radius:20px;padding:3px 9px;font-size:11px;margin:2px}
.sh{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border-left:3px solid var(--accent);padding-left:10px;margin:22px 0 12px}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;max-width:360px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;margin-top:8px;font-size:13px;display:flex;align-items:flex-start;gap:8px;animation:slideIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tok{border-left:3px solid var(--green)}.terr{border-left:3px solid var(--red)}.tinfo{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;border:1px solid var(--border);margin:3px;background:var(--bg3);color:var(--text2);user-select:none}
.chip:hover{border-color:var(--border2)}
.chip.active{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent2)}
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.pbar{height:3px;background:var(--accent);border-radius:2px}
.ptrack{background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:8px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.bdi{margin-bottom:11px}
.bdr{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bdt{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.bdf{height:5px;border-radius:3px}
.hmt{border-collapse:collapse;width:100%;font-size:11px}
.hmt th{padding:4px;color:var(--text3);font-weight:400;font-size:9px;text-align:center;writing-mode:vertical-lr;transform:rotate(180deg);height:80px;min-width:30px}
.hmc{border-radius:4px;padding:3px 2px;font-family:'DM Mono',monospace;font-size:11px;min-width:24px;text-align:center}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:38px;width:100%;max-width:420px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:8px;padding:4px;margin-bottom:26px}
.auth-tab{flex:1;padding:8px;border-radius:6px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all .2s;border:none;background:none;font-family:'Outfit',sans-serif}
.auth-tab.active{background:var(--accent);color:#fff;font-weight:500}
.errbox{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;line-height:1.5}
@media(max-width:900px){.sidebar{width:56px}.main{margin-left:56px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><p style="font-size:14px;color:var(--text3)">Loading CloudScreen...</p></div>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>
// ─── No JSX, no Babel, no htm — pure React.createElement ───────────────────
// This is the only 100% reliable approach for production without a build step.
const e = React.createElement;
const { useState, useEffect, useRef, useCallback } = React;

const API = (location.hostname==="localhost"||location.hostname==="127.0.0.1")
  ? "http://localhost:8000/api" : "/api";

// ── Auth ───────────────────────────────────────────────────────────────────
const getToken = () => localStorage.getItem("cs_token");
const getUser  = () => { try{return JSON.parse(localStorage.getItem("cs_user")||"null")}catch{return null} };
const setAuth  = (t,u) => { localStorage.setItem("cs_token",t); localStorage.setItem("cs_user",JSON.stringify(u)); };
const clearAuth= () => { localStorage.removeItem("cs_token"); localStorage.removeItem("cs_user"); };

async function api(path, opts={}) {
  const token = getToken();
  const isForm = opts.body instanceof FormData;
  const headers = {
    ...(token ? {"Authorization":`Bearer ${token}`} : {}),
    ...(!isForm ? {"Content-Type":"application/json"} : {}),
  };
  const res = await fetch(API+path, {...opts, headers});
  if (!res.ok) {
    let msg = "Error "+res.status;
    try { const j=await res.json(); msg=j.detail||j.message||msg; } catch{}
    throw new Error(msg);
  }
  const ct = res.headers.get("content-type")||"";
  if (ct.includes("application/json")) return res.json();
  return res;
}

// ── Helpers ────────────────────────────────────────────────────────────────
const sc = s => s>=75?"var(--green)":s>=55?"var(--accent2)":s>=35?"var(--amber)":"var(--red)";
const vc = v => v&&v.includes("Strong")?"vb vbs":v&&v.includes("Good")?"vb vbg":v&&v.includes("Partial")?"vb vbp":"vb vbw";

// ── Toasts ─────────────────────────────────────────────────────────────────
function useToasts() {
  const [list,setList] = useState([]);
  const add = useCallback((msg,type) => {
    type = type||"info";
    const id = Date.now();
    setList(l=>[...l,{id,msg,type}]);
    setTimeout(()=>setList(l=>l.filter(x=>x.id!==id)), type==="error"?6000:4000);
  },[]);
  return {list,add};
}

function Toasts({list}) {
  return e("div",{className:"toast-wrap"},
    list.map(t=>e("div",{key:t.id,className:"toast "+(t.type==="success"?"tok":t.type==="error"?"terr":"tinfo")},
      e("span",null,t.type==="success"?"✓":t.type==="error"?"⚠":"•"),
      e("span",null,t.msg)
    ))
  );
}

// ── Chart wrapper ──────────────────────────────────────────────────────────
function ChartCanvas({type, config, deps}) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!ref.current||!config) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {type, ...config});
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  }, deps||[]);
  return e("canvas",{ref});
}

// ── Gap Analysis ───────────────────────────────────────────────────────────
function GapPanel({resume}) {
  const gap = resume && resume.gap_analysis;
  if(!gap||!gap.total_required) return e("div",{style:{fontSize:12,color:"var(--text3)",padding:"10px 0"}},"No required skills found in job description.");
  const pct = gap.match_percentage||0;
  const col = pct>=70?"var(--green)":pct>=40?"var(--amber)":"var(--red)";
  return e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:14}},
      e("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:32,color:col,fontWeight:500}},pct+"%"),
      e("div",null,
        e("div",{style:{fontSize:13,fontWeight:500}},"Skill Coverage"),
        e("div",{style:{fontSize:11,color:"var(--text3)",marginTop:2}},gap.total_matched+"/"+gap.total_required+" required skills matched")
      )
    ),
    gap.matched_skills&&gap.matched_skills.length>0 && e("div",{style:{marginBottom:12}},
      e("div",{style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"var(--green)",marginBottom:7}},"✓ Has ("+gap.total_matched+")"),
      e("div",null,gap.matched_skills.map(s=>e("span",{key:s,style:{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.25)",color:"var(--green)",borderRadius:20,padding:"2px 9px",fontSize:11,margin:2,display:"inline-block"}},s)))
    ),
    gap.missing_skills&&gap.missing_skills.length>0 && e("div",null,
      e("div",{style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"var(--red)",marginBottom:7}},"✗ Missing ("+gap.total_missing+")"),
      e("div",null,gap.missing_skills.map(s=>e("span",{key:s,style:{background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.25)",color:"var(--red)",borderRadius:20,padding:"2px 9px",fontSize:11,margin:2,display:"inline-block"}},s)))
    )
  );
}

// ── Candidate Modal ────────────────────────────────────────────────────────
function CandidateModal({resume,onClose}) {
  if(!resume) return null;
  const bd = resume.score_breakdown||{};
  const col = sc(resume.score||0);
  return e("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e("div",{className:"modal"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}},
        e("div",null,
          e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:22,marginBottom:4}},resume.candidate_name),
          e("div",{style:{fontSize:11,color:"var(--text3)",marginBottom:8}},resume.filename),
          e("span",{className:vc(resume.verdict)},resume.verdict)
        ),
        e("div",{style:{textAlign:"right"}},
          e("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:40,color:col,lineHeight:1}},(resume.score||0).toFixed(1)),
          e("div",{style:{fontSize:11,color:"var(--text3)"}},"match score")
        )
      ),
      e("div",{className:"grid2",style:{gap:16,marginBottom:18}},
        e("div",{className:"card-sm"},
          e("div",{style:{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"var(--text3)",marginBottom:10}},"Contact"),
          [["📧",resume.email],["📞",resume.phone],["💻",resume.github],["🔗",resume.linkedin]].filter(x=>x[1]).map(([icon,val])=>
            e("div",{key:icon,style:{fontSize:12,color:"var(--text2)",marginBottom:5,wordBreak:"break-all"}},icon+" "+val)
          ),
          e("div",{style:{marginTop:8,fontSize:12,color:"var(--text2)"}},"⏱ "+(resume.experience_years||0)+"+ yrs experience")
        ),
        e("div",{className:"card-sm",style:{height:165}},
          e(ChartCanvas,{type:"radar",config:{
            data:{labels:["TF-IDF","Skills","Experience","Education"],datasets:[{data:[bd.tfidf_similarity||0,bd.skill_match||0,bd.experience_fit||0,bd.education_fit||0],backgroundColor:"rgba(99,102,241,.15)",borderColor:"#6366f1",pointBackgroundColor:"#818cf8",borderWidth:1.5,pointRadius:3}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,grid:{color:"rgba(99,120,255,.1)"},ticks:{display:false},pointLabels:{color:"#8b93b8",font:{size:10,family:"Outfit"}}}},plugins:{legend:{display:false}}}
          },deps:[resume.id]})
        )
      ),
      e("div",{className:"sh"},"Score Breakdown"),
      [["TF-IDF Similarity",bd.tfidf_similarity||0,"#6366f1"],["Skill Match",bd.skill_match||0,"#34d399"],["Experience Fit",bd.experience_fit||0,"#fbbf24"],["Education Fit",bd.education_fit||0,"#818cf8"]].map(([lbl,val,col2])=>
        e("div",{key:lbl,className:"bdi"},
          e("div",{className:"bdr"},e("span",{style:{color:"var(--text2)"}},lbl),e("span",{style:{fontFamily:"'DM Mono',monospace",color:col2}},val.toFixed(1)+"%")),
          e("div",{className:"bdt"},e("div",{className:"bdf",style:{width:val+"%",background:col2}}))
        )
      ),
      e("div",{className:"sh"},"Gap Analysis"),
      e(GapPanel,{resume}),
      resume.matched_keywords&&resume.matched_keywords.length>0 && [
        e("div",{key:"kw-head",className:"sh"},"JD Keywords Found"),
        e("div",{key:"kw-list"},resume.matched_keywords.slice(0,25).map(kw=>
          e("span",{key:kw,style:{background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.25)",color:"var(--amber)",borderRadius:20,padding:"2px 9px",fontSize:11,margin:2,display:"inline-block"}},kw)
        ))
      ],
      resume.skills&&Object.keys(resume.skills).length>0 && [
        e("div",{key:"sk-head",className:"sh"},"Skills Detected by spaCy"),
        ...Object.entries(resume.skills).filter(([,s])=>s.length>0).map(([cat,skills])=>
          e("div",{key:cat,style:{marginBottom:10}},
            e("div",{style:{fontSize:11,color:"var(--text3)",marginBottom:5}},cat),
            e("div",null,skills.map(s=>e("span",{key:s,className:"tag"},s)))
          )
        )
      ],
      resume.education&&resume.education.length>0 && [
        e("div",{key:"edu-head",className:"sh"},"Education"),
        ...resume.education.map((ed,i)=>e("div",{key:i,className:"card-sm",style:{marginBottom:7,fontSize:13,color:"var(--text2)"}},"🎓 "+ed))
      ],
      e("div",{style:{marginTop:22,display:"flex",justifyContent:"flex-end"}},
        e("button",{className:"btn btng",onClick:onClose},"Close")
      )
    )
  );
}

// ── Upload Panel ───────────────────────────────────────────────────────────
function UploadPanel({job,onUploaded,toast}) {
  const [files,setFiles]   = useState([]);
  const [drag,setDrag]     = useState(false);
  const [loading,setLoading] = useState(false);
  const inputRef = useRef(null);

  function addFiles(newFiles) {
    const valid=[...newFiles].filter(f=>f.name.endsWith(".pdf")||f.name.endsWith(".txt"));
    if(valid.length<newFiles.length) toast((newFiles.length-valid.length)+" file(s) skipped — PDF/TXT only","info");
    setFiles(prev=>{const names=new Set(prev.map(f=>f.name));return[...prev,...valid.filter(f=>!names.has(f.name))];});
  }

  async function upload() {
    if(!files.length||!job) return;
    setLoading(true);
    try {
      const fd=new FormData(); files.forEach(f=>fd.append("files",f));
      const data=await api("/jobs/"+job.id+"/upload",{method:"POST",body:fd});
      toast(data.message,"success"); setFiles([]); onUploaded();
    } catch(ex) { toast("Upload failed: "+ex.message,"error"); }
    finally { setLoading(false); }
  }

  const totalMB = (files.reduce((s,f)=>s+f.size,0)/1024/1024).toFixed(1);

  return e("div",{className:"card"},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:18}},"Upload Resumes"),
      e("div",{style:{fontSize:11,color:"var(--text3)"}},"PDF and TXT supported")
    ),
    e("div",{className:"upload-zone"+(drag?" drag":""),
      onClick:()=>inputRef.current&&inputRef.current.click(),
      onDragOver:ev=>{ev.preventDefault();setDrag(true)},
      onDragLeave:()=>setDrag(false),
      onDrop:ev=>{ev.preventDefault();setDrag(false);addFiles(ev.dataTransfer.files)}},
      e("div",{style:{fontSize:38,marginBottom:10}},"📂"),
      e("div",{style:{fontSize:14,color:"var(--text2)",fontWeight:500}},"Drop PDF or TXT resumes here"),
      e("div",{style:{fontSize:12,color:"var(--text3)",marginTop:5}},"or click to browse · multiple files supported"),
      e("input",{ref:inputRef,type:"file",multiple:true,accept:".pdf,.txt",style:{display:"none"},onChange:ev=>addFiles(ev.target.files)})
    ),
    files.length>0 && e("div",{style:{marginTop:14}},
      e("div",{style:{fontSize:11,color:"var(--text3)",marginBottom:8}},files.length+" file"+(files.length>1?"s":"")+" · "+totalMB+" MB total"),
      files.map((f,i)=>e("div",{key:i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",marginBottom:6,fontSize:12}},
        e("span",{style:{color:"var(--text2)"}},f.name.endsWith(".pdf")?"📄 ":"📝 "+f.name),
        e("span",{style:{display:"flex",alignItems:"center",gap:10}},
          e("span",{style:{color:"var(--text3)"}},(f.size/1024).toFixed(0)+" KB"),
          e("button",{style:{background:"none",border:"none",color:"var(--text3)",fontSize:14,cursor:"pointer",lineHeight:1,padding:2},onClick:()=>setFiles(prev=>prev.filter((_,j)=>j!==i))},"✕")
        )
      )),
      e("div",{style:{marginTop:14,display:"flex",gap:10,alignItems:"center"}},
        e("button",{className:"btn btnp",onClick:upload,disabled:loading},
          loading?[e("div",{key:"sp",className:"sp"}),e("span",{key:"t"}," Analysing...")]:"🚀 Screen "+files.length+" Resume"+(files.length>1?"s":"")
        ),
        e("button",{className:"btn btng",onClick:()=>setFiles([]),disabled:loading},"Clear All")
      )
    )
  );
}

function SkillHeatmap({jobId}) {

  if(!data||!data.matrix||!data.matrix.length) return null;
  const maxVal = Math.max(...data.matrix.flatMap(r=>data.categories.map(c=>r[c]||0)),1);
  return e("div",{className:"card",style:{overflowX:"auto"}},
    e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:16,marginBottom:14}},"Skill Coverage Heatmap"),

        e("div",{className:"nav-sec"},"Navigation"),
        NAV.map(n=>e("div",{key:n.id,className:"nav-item"+(page===n.id?" active":""),onClick:()=>setPage(n.id)},
          e("span",{style:{fontSize:14,width:18,textAlign:"center"}},n.icon),
          e("span",null,n.label)
        )),
        jobs.length>0&&[
          e("div",{key:"jsec",className:"nav-sec",style:{marginTop:16}},"My Jobs"),
          ...jobs.slice(0,10).map(j=>e("div",{key:j.id,className:"nav-item"+(activeJob&&activeJob.id===j.id?" active":""),onClick:()=>selectJob(j)},
            e("span",{style:{fontSize:14,width:18,textAlign:"center"}},"💼"),
            e("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,fontSize:12}},j.title),
            e("span",{style:{fontSize:10,color:"var(--text3)",background:"var(--bg)",borderRadius:10,padding:"1px 6px",flexShrink:0}},j.resume_count)
          ))
        ]
      ),
      e("div",{className:"sidebar-bottom"},
        e("div",{className:"user-pill"},
          e("div",{className:"user-av"},(user.name||"?")[0].toUpperCase()),
          e("div",{style:{overflow:"hidden",flex:1}},
            e("div",{style:{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},user.name),
            e("div",{style:{fontSize:10,color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis"}},user.email)
          )
        ),
        e("button",{className:"btn btng btnsm",style:{width:"100%",justifyContent:"center"},onClick:logout},"Sign Out")
      )
    ),

    // ── Main
    e("main",{className:"main"},
      e("div",{className:"topbar"},
        e("div",null,
          page==="screen"&&[e("div",{key:"t",className:"page-title"},"Resume Screening"),e("div",{key:"s",className:"page-sub"},"Upload resumes · NLP extraction · TF-IDF ranking")],
          page==="analytics"&&[e("div",{key:"t",className:"page-title"},"Analytics"),e("div",{key:"s",className:"page-sub"},"Insights across your screening sessions")],
          page==="about"&&[e("div",{key:"t",className:"page-title"},"About"),e("div",{key:"s",className:"page-sub"},"Architecture, tech stack and API")]
        ),
        e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          page==="screen"&&activeJob&&[
            e("a",{key:"pdf",href:API+"/jobs/"+activeJob.id+"/export/pdf",target:"_blank",className:"btn btng btnsm",style:{textDecoration:"none"}},"⬇ PDF"),
            e("a",{key:"csv",href:API+"/jobs/"+activeJob.id+"/export/csv",target:"_blank",className:"btn btng btnsm",style:{textDecoration:"none"}},"⬇ CSV")
          ],
          page==="screen"&&e("button",{className:"btn btnp",onClick:()=>setShowCreate(true)},"+ New Job")
        )
      ),

      e("div",{className:"content"},
        page==="screen"&&e("div",null,
          // Job selector card
          e("div",{className:"card"},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
              e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:18}},activeJob?"Screening: "+activeJob.title+(activeJob.company?" @ "+activeJob.company:""):"Select a Job Posting"),
              activeJob&&e("button",{className:"btn btnd btnsm",onClick:async()=>{
                if(!confirm("Delete this job and all its resumes?"))return;
                try{await api("/jobs/"+activeJob.id,{method:"DELETE"});setJob(null);loadJobs();toast("Job deleted","info");}
                catch(ex){toast("Delete failed: "+ex.message,"error");}
              }},"Delete Job")
            ),
            jobs.length===0
              ?e("div",{style:{fontSize:13,color:"var(--text3)"}},
                  "No jobs yet. ",e("span",{style:{color:"var(--accent2)",cursor:"pointer",textDecoration:"underline"},onClick:()=>setShowCreate(true)},"Create your first job posting →"))
              :e("div",{style:{display:"flex",flexWrap:"wrap"}},
                  jobs.map(j=>e("div",{key:j.id,className:"chip"+(activeJob&&activeJob.id===j.id?" active":""),onClick:()=>selectJob(j)},
                    "💼 ",e("span",{style:{fontWeight:500}},j.title),
                    j.company&&e("span",{style:{color:"var(--text3)"}}," · "+j.company),
                    e("span",{style:{background:"var(--bg2)",borderRadius:10,padding:"1px 6px",fontSize:10,color:"var(--text3)"}},j.resume_count)
                  )),
                  e("div",{className:"chip",style:{border:"1px dashed var(--border2)",color:"var(--text3)"},onClick:()=>setShowCreate(true)},"+ New Job")
                )
          ),
          // Upload + rankings
          activeJob?e("div",null,
            e(UploadPanel,{job:activeJob,toast,onUploaded:()=>{loadResumes(activeJob.id);loadJobs();}}),
            resumes.length>0&&e("div",null,
              e("div",{className:"kpi-grid"},
                [["Candidates",resumes.length,"var(--accent2)"],["Top Score",(resumes[0]&&resumes[0].score||0).toFixed(1)+"%","var(--green)"],["Avg Score",(resumes.reduce((s,r)=>s+(r.score||0),0)/resumes.length).toFixed(1)+"%","var(--amber)"],["Total Skills",resumes.reduce((s,r)=>s+(r.total_skills||0),0),"var(--accent2)"]].map(([l,v,c])=>
                  e("div",{key:l,className:"kpi"},e("div",{className:"kpi-lbl"},l),e("div",{className:"kpi-val",style:{color:c,fontSize:22}},v))
                )
              ),
              e("div",{className:"card"},
                e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:16,marginBottom:14}},"Score Comparison"),
                e("div",{style:{height:220}},e(ChartCanvas,{type:"bar",config:{
                  data:{labels:resumes.slice(0,10).map(r=>(r.candidate_name||"?").split(" ")[0]),
                    datasets:[{label:"Match %",data:resumes.slice(0,10).map(r=>+(r.score||0).toFixed(1)),
                      backgroundColor:resumes.slice(0,10).map(r=>r.score>=75?"rgba(52,211,153,.75)":r.score>=55?"rgba(129,140,248,.75)":r.score>=35?"rgba(251,191,36,.75)":"rgba(248,113,113,.75)"),
                      borderColor:resumes.slice(0,10).map(r=>r.score>=75?"#34d399":r.score>=55?"#818cf8":r.score>=35?"#fbbf24":"#f87171"),
                      borderWidth:1,borderRadius:6}]},
                  options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,grid:{color:"rgba(99,120,255,.06)"},ticks:{color:"#485077",font:{size:10}}},x:{grid:{display:false},ticks:{color:"#8b93b8",font:{size:11}}}},plugins:{legend:{display:false}}}
                },deps:[resumes.length]}))
              ),
              e("div",{className:"sh"},"Candidate Rankings — click any row for full details"),
              e(RankingsPanel,{resumes,jobId:activeJob.id,toast,onDeleted:()=>{loadResumes(activeJob.id);loadJobs();}}),
              e(SkillHeatmap,{jobId:activeJob.id}),
              e(BatchRadar,{jobId:activeJob.id})
            )
          ):e("div",{className:"empty"},
            e("div",{style:{fontSize:44,marginBottom:12,opacity:.35}},"💼"),
            e("div",{style:{fontSize:15,color:"var(--text2)",marginBottom:6,fontWeight:500}},"No job selected"),
            e("div",{style:{fontSize:13}},"Select a job posting above, or create a new one"),
            e("button",{className:"btn btnp",style:{marginTop:18},onClick:()=>setShowCreate(true)},"+ Create Job Posting")
          )
        ),
        page==="analytics"&&e(AnalyticsPage,{toast}),
        page==="about"&&e("div",null,
          e("div",{className:"card"},
            e("div",{style:{fontFamily:"'DM Serif Display',serif",fontSize:22,marginBottom:8}},"Cloud Resume Screener v2"),
            e("div",{style:{fontSize:13,color:"var(--text2)",lineHeight:1.8,maxWidth:620}},"NLP-powered recruitment intelligence. Each account is private. Powered by spaCy EntityRuler, sklearn TF-IDF, FastAPI, JWT auth, and Neon PostgreSQL.")
          ),
          e("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}},
            ["Python 3.13","FastAPI","spaCy EntityRuler","sklearn TF-IDF","SQLAlchemy","Neon PostgreSQL","JWT + bcrypt","React 18 (no build)","Chart.js 4","ReportLab"].map(t=>
              e("span",{key:t,className:"tag",style:{fontSize:12,padding:"5px 12px"}},t))
          ),
          e("div",{className:"card-sm",style:{fontSize:13,color:"var(--text2)",lineHeight:2.2}},
            e("div",null,"📖 ",e("a",{href:"/docs",target:"_blank",style:{color:"var(--accent2)"}},"Swagger API Docs")),
            e("div",null,"🚀 ",e("a",{href:"https://github.com/Jhil-Patel/cloud-resume-screener",target:"_blank",style:{color:"var(--accent2)"}},"GitHub Repository")),
            e("div",null,"🧪 ",e("span",{style:{color:"var(--text3)"}},"39 pytest tests passing"))
          )
        )
      )
    ),
    showCreate&&e(CreateJobModal,{onClose:()=>setShowCreate(false),toast,onCreate:j=>{loadJobs();selectJob(j);}}),
    e(Toasts,{list:toasts})
  );
}

// Mount
try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  document.getElementById("loading").style.display="none";
} catch(err) {
  document.getElementById("loading").innerHTML='<div style="color:#f87171;font-size:14px;text-align:center;padding:20px"><b>Failed to load app</b><br><small>'+err.message+'</small><br><br><a href="/docs" style="color:#818cf8">Try API docs instead</a></div>';
}
</script>
</body>
</html>
