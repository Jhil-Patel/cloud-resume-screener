<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#07080f;--bg2:#0d0f1a;--bg3:#111422;--bg4:#161928;--border:rgba(99,120,255,0.12);--border2:rgba(99,120,255,0.22);--accent:#6366f1;--accent2:#818cf8;--green:#34d399;--amber:#fbbf24;--red:#f87171;--text:#e8eaf5;--text2:#8b93b8;--text3:#485077;--mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;--sans:'Outfit',sans-serif;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.main{margin-left:240px;flex:1;min-height:100vh}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent) 0%,#a78bfa 100%);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-name{font-family:var(--serif);font-size:20px;color:var(--text)}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.nav{padding:16px 12px;flex:1}
.nav-section{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);padding:0 8px;margin:16px 0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,0.15);color:var(--accent2);border-color:rgba(99,102,241,0.2)}
.nav-item .icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 12px;margin-bottom:8px}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.topbar{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.page-title{font-family:var(--serif);font-size:22px}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.content{padding:28px 32px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.kpi-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.kpi-value{font-family:var(--mono);font-size:28px;font-weight:500}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13.5px;outline:none;transition:border-color 0.15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
textarea.input{resize:vertical;min-height:120px;line-height:1.6}
select.input{cursor:pointer}
.label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.form-group{margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;user-select:none;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5254d0;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(99,102,241,0.05)}
.rank-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:10px;display:flex;align-items:center;gap:20px;cursor:pointer;transition:all 0.2s}
.rank-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.rank-bar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.rank-bar{height:6px;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.verdict{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.verdict.strong{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.verdict.good{background:rgba(99,102,241,0.12);color:var(--accent2);border:1px solid rgba(99,102,241,0.2)}
.verdict.partial{background:rgba(251,191,36,0.12);color:var(--amber);border:1px solid rgba(251,191,36,0.2)}
.verdict.weak{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.tag{display:inline-flex;align-items:center;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.18);color:var(--accent2);border-radius:20px;padding:3px 10px;font-size:11px;margin:2px}
.section-head{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border-left:3px solid var(--accent);padding-left:10px;margin:24px 0 14px}
.chart-wrap{position:relative;height:240px}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 18px;margin-top:8px;font-size:13px;display:flex;align-items:center;gap:8px;animation:slideIn 0.2s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:340px}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:90%;max-width:680px;max-height:85vh;overflow-y:auto;animation:scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes scaleIn{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:15px;color:var(--text2);margin-bottom:6px}
.progress-bar{height:3px;background:var(--accent);border-radius:2px;transition:width 0.3s}
.progress-track{background:var(--bg3);border-radius:2px;overflow:hidden}
.job-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);margin:3px;background:var(--bg3);color:var(--text2)}
.job-chip.active{background:rgba(99,102,241,0.15);border-color:var(--accent);color:var(--accent2)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.breakdown-item{margin-bottom:12px}
.breakdown-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.breakdown-track{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.breakdown-fill{height:5px;border-radius:3px}

/* Auth page */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:40px;width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-tabs{display:flex;gap:0;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:8px;border-radius:6px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);transition:all 0.2s;border:none;background:none;font-family:var(--sans)}
.auth-tab.active{background:var(--accent);color:#fff;font-weight:500}
.auth-divider{text-align:center;color:var(--text3);font-size:12px;margin:16px 0}
.error-msg{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;margin-bottom:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? "http://localhost:8000/api"
  : "/api";

// ── Token storage ──────────────────────────────────────────────────────────
const getToken  = () => localStorage.getItem("cs_token");
const getUser   = () => { try { return JSON.parse(localStorage.getItem("cs_user")||"null"); } catch { return null; } };
const setAuth   = (token, user) => { localStorage.setItem("cs_token", token); localStorage.setItem("cs_user", JSON.stringify(user)); };
const clearAuth = () => { localStorage.removeItem("cs_token"); localStorage.removeItem("cs_user"); };

const authFetch = (url, opts={}) => {
  const token = getToken();
  return fetch(url, {
    ...opts,
    headers: { "Content-Type":"application/json", ...(token?{"Authorization":`Bearer ${token}`}:{}), ...(opts.headers||{}) }
  });
};

// ── Utilities ──────────────────────────────────────────────────────────────
function scoreColor(s){if(s>=75)return"var(--green)";if(s>=55)return"var(--accent2)";if(s>=35)return"var(--amber)";return"var(--red)"}
function verdictClass(v){if(!v)return"";if(v.includes("Strong"))return"strong";if(v.includes("Good"))return"good";if(v.includes("Partial"))return"partial";return"weak"}

function useToasts(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="info")=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);},[]);
  return{toasts,add};
}
function ToastContainer({toasts}){
  return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.type==="success"?"✓":t.type==="error"?"✕":"•"}<span>{t.msg}</span></div>)}</div>;
}

// ── Auth Page ──────────────────────────────────────────────────────────────
function AuthPage({ onAuth, toast }) {
  const [tab, setTab]       = useState("login");
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");
  const [form, setForm]     = useState({ name:"", email:"", password:"" });

  async function submit() {
    setError(""); setLoading(true);
    try {
      const endpoint = tab === "login" ? "/auth/login" : "/auth/register";
      const body     = tab === "login"
        ? { email: form.email, password: form.password }
        : { name: form.name, email: form.email, password: form.password };
      const r = await fetch(`${API}${endpoint}`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });
      const data = await r.json();
      if (!r.ok) { setError(data.detail || "Something went wrong"); return; }
      setAuth(data.access_token, data.user);
      toast(`Welcome, ${data.user.name}! 👋`, "success");
      onAuth(data.user);
    } catch { setError("Connection failed. Is the server running?"); }
    finally { setLoading(false); }
  }

  function handleKey(e) { if (e.key === "Enter") submit(); }

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:8}}>
            <div className="logo-icon">⚡</div>
            <div style={{fontFamily:"var(--serif)",fontSize:24}}>CloudScreen</div>
          </div>
          <div style={{fontSize:12,color:"var(--text3)"}}>Resume Intelligence Platform</div>
        </div>

        <div className="auth-tabs">
          <button className={`auth-tab ${tab==="login"?"active":""}`} onClick={()=>{setTab("login");setError("")}}>Sign In</button>
          <button className={`auth-tab ${tab==="register"?"active":""}`} onClick={()=>{setTab("register");setError("")}}>Create Account</button>
        </div>

        {error && <div className="error-msg">⚠ {error}</div>}

        {tab === "register" && (
          <div className="form-group">
            <label className="label">Full Name</label>
            <input className="input" placeholder="Jhil Patel" value={form.name}
              onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={handleKey}/>
          </div>
        )}
        <div className="form-group">
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="you@example.com" value={form.email}
            onChange={e=>setForm(f=>({...f,email:e.target.value}))} onKeyDown={handleKey}/>
        </div>
        <div className="form-group">
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••" value={form.password}
            onChange={e=>setForm(f=>({...f,password:e.target.value}))} onKeyDown={handleKey}/>
        </div>

        <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",marginTop:4}}
          onClick={submit} disabled={loading}>
          {loading ? <><div className="spinner"/> &nbsp;{tab==="login"?"Signing in...":"Creating account..."}</>
                   : tab==="login" ? "Sign In →" : "Create Account →"}
        </button>

        <div className="auth-divider">
          {tab==="login" ? "Don't have an account? " : "Already have an account? "}
          <span style={{color:"var(--accent2)",cursor:"pointer"}}
            onClick={()=>{setTab(tab==="login"?"register":"login");setError("")}}>
            {tab==="login" ? "Create one" : "Sign in"}
          </span>
        </div>

        <div style={{fontSize:11,color:"var(--text3)",textAlign:"center",lineHeight:1.7}}>
          🔒 Your jobs and resumes are private — only visible to you
        </div>
      </div>
    </div>
  );
}

// ── Charts ─────────────────────────────────────────────────────────────────
function RadarChart({data}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{if(!ref.current||!data)return;if(chartRef.current)chartRef.current.destroy();
    const bd=data.score_breakdown||{};
    chartRef.current=new Chart(ref.current,{type:"radar",data:{labels:["TF-IDF","Skills","Experience","Education"],datasets:[{data:[bd.tfidf_similarity||0,bd.skill_match||0,bd.experience_fit||0,bd.education_fit||0],backgroundColor:"rgba(99,102,241,0.15)",borderColor:"#6366f1",pointBackgroundColor:"#818cf8",borderWidth:1.5,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,grid:{color:"rgba(99,120,255,0.1)"},ticks:{display:false},pointLabels:{color:"#8b93b8",font:{size:10,family:"Outfit"}}}},plugins:{legend:{display:false}},animation:{duration:400}}});
    return()=>chartRef.current?.destroy();
  },[data]);
  return <canvas ref={ref}/>;
}

function BarChart({resumes}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{if(!ref.current||!resumes?.length)return;if(chartRef.current)chartRef.current.destroy();
    const labels=resumes.slice(0,10).map(r=>r.candidate_name?.split(" ")[0]||"?");
    const scores=resumes.slice(0,10).map(r=>r.score||0);
    const bcolors=scores.map(s=>s>=75?"rgba(52,211,153,0.7)":s>=55?"rgba(129,140,248,0.7)":s>=35?"rgba(251,191,36,0.7)":"rgba(248,113,113,0.7)");
    const bcolors2=scores.map(s=>s>=75?"#34d399":s>=55?"#818cf8":s>=35?"#fbbf24":"#f87171");
    chartRef.current=new Chart(ref.current,{type:"bar",data:{labels,datasets:[{label:"Match Score",data:scores,backgroundColor:bcolors,borderColor:bcolors2,borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,grid:{color:"rgba(99,120,255,0.06)"},ticks:{color:"#485077",font:{size:10}}},x:{grid:{display:false},ticks:{color:"#8b93b8",font:{size:11}}}},plugins:{legend:{display:false}},animation:{duration:500}}});
    return()=>chartRef.current?.destroy();
  },[resumes]);
  return <canvas ref={ref}/>;
}

function DonutChart({distribution}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{if(!ref.current||!distribution)return;if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"doughnut",data:{labels:Object.keys(distribution),datasets:[{data:Object.values(distribution),backgroundColor:["rgba(248,113,113,0.7)","rgba(251,191,36,0.7)","rgba(99,102,241,0.7)","rgba(129,140,248,0.7)","rgba(52,211,153,0.7)"],borderColor:"transparent",borderWidth:2,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{position:"right",labels:{color:"#8b93b8",font:{size:10,family:"Outfit"},boxWidth:10,padding:8}}},animation:{duration:400}}});
    return()=>chartRef.current?.destroy();
  },[distribution]);
  return <canvas ref={ref}/>;
}

function BatchCompareChart({jobId}){
  const ref=useRef(null);const chartRef=useRef(null);
  const[candidates,setCandidates]=useState([]);
  useEffect(()=>{if(!jobId)return;authFetch(`${API}/jobs/${jobId}/compare?top=3`).then(r=>r.json()).then(setCandidates).catch(()=>{});},[jobId]);
  useEffect(()=>{
    if(!ref.current||!candidates.length)return;if(chartRef.current)chartRef.current.destroy();
    const colors2=["#6366f1","#34d399","#fbbf24"];
    chartRef.current=new Chart(ref.current,{type:"radar",data:{labels:["TF-IDF Sim","Skill Match","Exp Fit","Edu Fit"],datasets:candidates.map((c,i)=>({label:`#${c.rank} ${c.name?.split(" ")[0]}`,data:[c.breakdown?.tfidf_similarity||0,c.breakdown?.skill_match||0,c.breakdown?.experience_fit||0,c.breakdown?.education_fit||0],backgroundColor:colors2[i]+"26",borderColor:colors2[i],pointBackgroundColor:colors2[i],borderWidth:2,pointRadius:4}))},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,grid:{color:"rgba(99,120,255,0.1)"},ticks:{display:false},pointLabels:{color:"#8b93b8",font:{size:10,family:"Outfit"}}}},plugins:{legend:{position:"bottom",labels:{color:"#8b93b8",font:{size:10,family:"Outfit"},boxWidth:10,padding:8}}},animation:{duration:400}}});
    return()=>chartRef.current?.destroy();
  },[candidates]);
  if(!candidates.length)return null;
  return(<div className="card" style={{marginTop:20}}><div style={{fontFamily:"var(--serif)",fontSize:16,marginBottom:4}}>Top {candidates.length} — Side-by-Side Comparison</div><div style={{fontSize:11,color:"var(--text3)",marginBottom:14}}>Radar chart across all 4 scoring dimensions</div><div style={{height:280}}><canvas ref={ref}/></div></div>);
}

// ── Skill Heatmap ──────────────────────────────────────────────────────────
function SkillHeatmap({jobId}){
  const[data,setData]=useState(null);
  useEffect(()=>{if(!jobId)return;authFetch(`${API}/jobs/${jobId}/heatmap`).then(r=>r.json()).then(setData).catch(()=>{});},[jobId]);
  if(!data||!data.matrix?.length)return null;
  const maxVal=Math.max(...data.matrix.flatMap(row=>data.categories.map(cat=>row[cat]||0)),1);
  return(
    <div className="card" style={{marginTop:20,overflowX:"auto"}}>
      <div style={{fontFamily:"var(--serif)",fontSize:16,marginBottom:14}}>Skill Coverage Heatmap</div>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>

          <th style={{padding:"6px 10px",color:"var(--text3)",textAlign:"left",fontWeight:400,minWidth:120}}>Candidate</th>
          {data.categories.map(cat=><th key={cat} style={{padding:"6px 4px",color:"var(--text3)",fontWeight:400,fontSize:9,textAlign:"center",writingMode:"vertical-lr",transform:"rotate(180deg)",height:80,minWidth:32}}>{cat}</th>)}
        </tr></thead>
        <tbody>{data.matrix.map((row,i)=>(

            <td style={{padding:"8px 10px",color:"var(--text2)",fontSize:12,whiteSpace:"nowrap"}}>#{row.rank} {row.name}</td>

              <td key={cat} style={{textAlign:"center",padding:"6px 3px"}}>
                <div style={{background:bg,borderRadius:4,padding:"3px 2px",color:val===0?"var(--text3)":"var(--accent2)",fontFamily:"var(--mono)",fontSize:11,minWidth:26}}>{val||"—"}</div>

// ── Upload Panel ───────────────────────────────────────────────────────────
function UploadPanel({job,onUploaded,toast}){
  const[files,setFiles]=useState([]);const[drag,setDrag]=useState(false);const[loading,setLoading]=useState(false);const inputRef=useRef(null);
  function addFiles(newFiles){const valid=[...newFiles].filter(f=>f.type==="application/pdf"||f.name.endsWith(".txt"));setFiles(prev=>{const names=new Set(prev.map(f=>f.name));return[...prev,...valid.filter(f=>!names.has(f.name))];});}
  async function upload(){
    if(!files.length||!job)return;setLoading(true);
    try{const fd=new FormData();files.forEach(f=>fd.append("files",f));
      const r=await fetch(`${API}/jobs/${job.id}/upload`,{method:"POST",headers:{"Authorization":`Bearer ${getToken()}`},body:fd});
      if(!r.ok)throw new Error((await r.json()).detail||"Upload failed");
      const data=await r.json();toast(`✅ ${data.message}`,"success");setFiles([]);onUploaded();}
    catch(e){toast(e.message,"error");}finally{setLoading(false);}
  }
  return(
    <div className="card">
      <div style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:16}}>Upload Resumes</div>
      <div className={`upload-zone ${drag?"drag":""}`} onClick={()=>inputRef.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files)}}>
        <div style={{fontSize:36,marginBottom:12}}>📂</div>
        <div style={{fontSize:14,color:"var(--text2)"}}>Drop PDF/TXT resumes here or click to browse</div>
        <div style={{fontSize:11,color:"var(--text3)",marginTop:5}}>Multiple files supported</div>
        <input ref={inputRef} type="file" multiple accept=".pdf,.txt" style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>
      </div>
      {files.length>0&&<div style={{marginTop:14}}>
        {files.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",marginBottom:6,fontSize:12}}>
          <span style={{color:"var(--text2)"}}>📄 {f.name}</span>
          <span style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"var(--text3)"}}>{(f.size/1024).toFixed(0)} KB</span><button style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14}} onClick={()=>setFiles(prev=>prev.filter((_,j)=>j!==i))}>✕</button></span>
        </div>)}
        <div style={{marginTop:12,display:"flex",gap:10}}>
          <button className="btn btn-primary" onClick={upload} disabled={loading}>{loading?<><div className="spinner"/> Analyzing...</>:`🚀 Screen ${files.length} Resume${files.length>1?"s":""}`}</button>
          <button className="btn btn-ghost" onClick={()=>setFiles([])}>Clear</button>
        </div>
      </div>}
    </div>
  );
}

            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {activeJob&&<>
                <a href={`${API}/jobs/${activeJob.id}/export/pdf`} target="_blank" className="btn btn-ghost btn-sm" style={{textDecoration:"none"}}>⬇ PDF</a>
                <a href={`${API}/jobs/${activeJob.id}/export/csv`} target="_blank" className="btn btn-ghost btn-sm" style={{textDecoration:"none"}}>⬇ CSV</a>
              </>}
              <button className="btn btn-primary" onClick={()=>setShowCreate(true)}>+ New Job</button>
            </div>
          )}
        </div>

        <div className="content">
          {page==="screen"&&(
            <>
              <div className="card" style={{marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontFamily:"var(--serif)",fontSize:18}}>My Job Postings</div>
                  {activeJob&&<button className="btn btn-danger btn-sm" onClick={async()=>{await authFetch(`${API}/jobs/${activeJob.id}`,{method:"DELETE"});setActiveJob(null);loadJobs();toast("Job deleted","info");}}>Delete Job</button>}
                </div>
                {jobs.length===0
                  ?<div style={{fontSize:13,color:"var(--text3)"}}>No jobs yet. <span style={{color:"var(--accent2)",cursor:"pointer"}} onClick={()=>setShowCreate(true)}>Create your first job posting →</span></div>
                  :<div style={{display:"flex",flexWrap:"wrap"}}>{jobs.map(j=><div key={j.id} className={`job-chip ${activeJob?.id===j.id?"active":""}`} onClick={()=>selectJob(j)}>💼 {j.title}{j.company&&<span style={{color:"var(--text3)"}}> · {j.company}</span>}<span style={{fontSize:10,color:"var(--text3)"}}>{j.resume_count}</span></div>)}</div>
                }
              </div>

              {activeJob?(<>
                <UploadPanel job={activeJob} toast={toast} onUploaded={()=>{loadResumes(activeJob.id);loadJobs();}}/>
                {resumes.length>0&&(<>
                  <div className="kpi-grid" style={{marginTop:20}}>
                    {[["Candidates",resumes.length,"var(--accent2)"],["Top Score",`${(resumes[0]?.score||0).toFixed(1)}%`,"var(--green)"],["Avg Score",`${(resumes.reduce((s,r)=>s+(r.score||0),0)/resumes.length).toFixed(1)}%`,"var(--amber)"],["Total Skills",resumes.reduce((s,r)=>s+(r.total_skills||0),0),"var(--accent2)"]].map(([l,v,c])=><div key={l} className="kpi"><div className="kpi-label">{l}</div><div className="kpi-value" style={{color:c,fontSize:22}}>{v}</div></div>)}
                  </div>
                  <div className="card" style={{marginTop:20,marginBottom:20}}><div style={{fontFamily:"var(--serif)",fontSize:16,marginBottom:16}}>Score Comparison</div><div className="chart-wrap"><BarChart resumes={resumes}/></div></div>
                  <div className="section-head">Candidate Rankings</div>
                  <RankingsPanel resumes={resumes} jobId={activeJob.id} toast={toast} onDeleted={()=>{loadResumes(activeJob.id);loadJobs();}}/>
                  <SkillHeatmap jobId={activeJob.id}/>
                  <BatchCompareChart jobId={activeJob.id}/>
                </>)}
              </>):(
                <div className="empty"><div className="empty-icon">💼</div><div className="empty-text">Select or create a job posting</div><div className="empty-sub">Then upload resumes to start screening</div><button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setShowCreate(true)}>+ Create Job</button></div>
              )}
            </>
          )}
          {page==="analytics"&&<AnalyticsPage toast={toast}/>}
          {page==="about"&&(
            <div>
              <div className="card" style={{marginBottom:20}}>
                <div style={{fontFamily:"var(--serif)",fontSize:22,marginBottom:8}}>Cloud Resume Screener v2</div>
                <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.8,maxWidth:600}}>An NLP-powered recruitment intelligence platform. Each user account is private — your jobs and resumes are only visible to you.</div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
                {["Python 3.13","FastAPI","spaCy EntityRuler","sklearn TF-IDF","SQLAlchemy","Neon PostgreSQL","JWT Auth","AWS S3","React 18","Chart.js","ReportLab"].map(t=><span key={t} className="tag" style={{fontSize:12,padding:"5px 12px"}}>{t}</span>)}
              </div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:8}}>API docs: <a href="/docs" target="_blank" style={{color:"var(--accent2)"}}>https://cloud-resume-screener.onrender.com/docs</a></div>
            </div>
          )}
        </div>
      </main>

      {showCreate&&<CreateJobModal onClose={()=>setShowCreate(false)} onCreate={j=>{loadJobs();selectJob(j);toast(`Created: ${j.title}`,"success");}}/>}
      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
